# Aqui ensinará o Rasa a entender o que o motorista está a dizer.
version: "3.1"

nlu:
  - intent: saudacao_radio
    examples: |
      - QAP
      - CCO na escuta?
      - central na escuta
      - rádio teste
      - bom dia central
      - QAP, central.
      - Central de despacho na escuta?
      - CCO, bom dia.
      - Teste de rádio, um dois.
      - Alguém copiando na frequência?
      - Operador do caminhão [zero cinco](id_equipamento) chamando.
      - Na escuta.

  - intent: confirmar_entendimento
    examples: |
      - copiado
      - positivo
      - TKS
      - afirmativo
      - entendido central
      - em deslocamento
      - a caminho
      - Copiado.
      - Positivo, central.
      - Afirmativo.
      - TKS, câmbio.
      - Entendido, prosseguindo.
      - Tudo certo por aqui.
      - Ciente da instrução.
      - A caminho.

  - intent: informar_emergencia
    examples: |
      - emergência emergência
      - socorro
      - acidente na via
      - risco de desmoronamento
      - tombamento na rampa
      - rádio comunicou incidente na frente
      - homem caído na pista
      - [Emergência](prioridade), [emergência](prioridade) na [rampa principal](local)!
      - [Risco de desmoronamento](sintoma) na [praça](local)!
      - [Acidente](sintoma) com [veículo leve](veiculo) na via.
      - [Tombamento](sintoma) de [caminhão](veiculo), [socorro](prioridade)!
      - Operador passando mal na cabine.

  - intent: informar_emergencia_incendio
    examples: |
      - fogo no [equipamento](veiculo)
      - fogo no compartimento do [motor](componente)
      - fogo na [roda](componente) dianteira
      - [caminhão](veiculo) à frente pegando fogo
      - princípio de incêndio na [cabine](componente)
      - muita fumaça saindo do [motor](componente)
      - o [caminhão](veiculo) está pegando fogo o que devo fazer
      - [caminho](veiculo) pegando fogo
      - fogo no equipamento, fogo no [motor](componente)!

  - intent: solicitar_basculamento
    examples: |
      - solicitar permissão para bascular
      - autorização para descarregar
      - chegando no [britador 1](local) para bascular
      - permissão de báscula na [pilha de estéril](local)
      - pronto para bascular
      - onde posso descarregar o [minério](carga)?
      - carregado com [carvão](carga), aguardando liberação.
      - Solicito permissão para bascular no [britador](local).
      - Chegando na [pilha de estéril](local), posso descarregar?
      - Pronto para báscula.
      - Autorização para jogar a [carga](carga).
      - Caminhão [cheio](status_carga), onde é o descarte?
      - Tô na fila do [britador um](local), aguardando liberação.
      - Qual a praça de descarregamento de [minério](carga)?
      - Posso levantar a caçamba aqui na [pilha sul](local)?

  - intent: solicitar_carregamento
    examples: |
      - vazio, indo para a [escavadeira 5](local)
      - na fila da [carregadeira](local)
      - aguardando carregamento na [frente de lavra](local)
      - qual o destino para carga?
      - Caminhão [vazio](status_carga), indo para a [escavadeira](local).
      - Aguardando carga na [frente de lavra](local).
      - Na fila da [carregadeira gigante](local).
      - Qual o destino para o próximo carregamento?
      - Estou posicionado sob a [escavadeira](local).
      - Chegando na praça de carga.
      - [Vazio](status_carga) e operando, pra onde eu vou?

  - intent: informar_falha_critica
    examples: |
      - perdi o freio
      - falha na direção, volante não responde
      - freio de serviço não responde
      - aviso de tensão do sistema alta
      - aviso de tensão do sistema baixa
      - caminhão não obedece o comando de parar
      - [perdi](sintoma) o [freio](componente), caminhão sem [freio](componente)!

  - intent: informar_problema_mecanico
    examples: |
      - caminhão perdendo potência
      - furou o [pneu](componente) dianteiro
      - temperatura do [motor](componente) muito alta
      - vazamento de [óleo](componente)
      - problema na [suspensão](componente)
      - falha elétrica no painel
      - solicitar equipe de manutenção
      - falha no sistema de carga da [bateria](componente)
      - aviso de pressão de ar do [retardador](componente)
      - [pára-brisas](componente) quebrado por pedra
      - nível do [líquido de arrefecimento](componente) muito baixo
      - falha de controle do [motor](componente)
      - nível baixo de óleo do [motor](componente)
      - [filtro de combustível](componente) obstruído
      - nível de combustível baixo no painel
      - pressão do óleo baixa
      - falha do [alarme de ré](componente)
      - superaquecimento do [conversor de torque](componente)
      - [farol](componente) falhou e apagou tudo
      - [retardador automático](componente) parou de funcionar
      - [pneu](componente) traseiro furado
      - O caminhão tá [perdendo força](sintoma) na [rampa](local).
      - Acho que [furou](sintoma) o [pneu](componente) traseiro.
      - Temperatura do [motor](componente) [subiu demais](nivel_medida), tá [fervendo](sintoma).
      - Deu [falha elétrica](sintoma) no [painel](componente) aqui.
      - [Vazamento](sintoma) de [óleo hidráulico](componente) na [direção](componente).
      - A [suspensão](componente) tá [batendo muito](sintoma).
      - Preciso da equipe de manutenção na [pista dois](local).
      - [Ar condicionado](componente) [parou de funcionar](sintoma).
      - O [rádio](componente) tá com muito [chiado](sintoma), tá difícil copiar.

  - intent: informar_status_operacional
    examples: |
      - caminhão [cheio](status_carga)
      - operando [vazio](status_carga)
      - iniciando turno
      - parando para refeição
      - finalizando turno, indo para o pátio
      - parada de comboio
      - Parando o equipamento para horário de almoço.
      - Iniciando o turno de serviço.
      - Indo para o [posto de combustível](local) abastecer.
      - Caminhão em comboio, aguardando a pista liberar.
      - Finalizando o turno, levando o caminhão pro [pátio](local).
      - Parada para troca de turno.

  - intent: solicitar_ultrapassagem
    examples: |
      - pedir permissão para ultrapassar [caminhão](veiculo) quebrado
      - posso passar o [caminhão](veiculo) parado na frente?
      - solicitando ultrapassagem na [motoniveladora](veiculo)
      - pedir para passar o [nivelador](veiculo)
      - ultrapassar [veículo leve](veiculo) na via
      - [veículo leve](veiculo) na minha frente, posso passar?

  - intent: informar_condicao_via
    examples: |
      - caminhão à frente parou abruptamente
      - excesso de poeira na área, visibilidade ruim
      - poeira excessiva vindo do caminhão à frente
      - [veículo leve](veiculo) parado em local de despejo
      - muita poeira, está perigoso

  - intent: solicitar_abastecimento
    examples: |
      - solicitar permissão para abastecer
      - nível de combustível na reserva
      - autorização para ir ao posto
      - caminhão precisa de diesel
      - indo abastecer o [caminhão](veiculo)

  - intent: informar_condicao_climatica
    examples: |
      - começou a chover muito forte
      - neblina densa na área, visibilidade zero
      - alerta de raios na frente de lavra
      - chuva forte, pista perigosa

  - intent: solicitar_apoio_pista
    examples: |
      - rampa escorregadia, enviar [motoniveladora](veiculo)
      - patinando na subida, preciso de trator de apoio
      - solicitar caminhão pipa, muita poeira na via
      - pista ruim, mandar equipamento para nivelar
      - rampa escorregadia, enviar [motoniveladora](veiculo)
      - patinando na subida, preciso de trator de apoio
      - solicitar [caminhão pipa](veiculo), muita [poeira](obstaculo_via) na via
      - mandar o [pipa](veiculo) para baixar a poeira
      - [carro pipa](veiculo) necessário na [frente de lavra](local)
      - pista ruim, mandar equipamento para nivelar

