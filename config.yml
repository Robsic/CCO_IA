#Aqui conecta os modelos pré-treinados
version: "3.1"

# Define o idioma base
language: pt

# O Pipeline define como o texto é processado (de texto bruto para intenções/entidades)
pipeline:
- name: SpacyNLP
  model: "pt_core_news_sm"
- name: SpacyTokenizer
- name: SpacyFeaturizer
- name: RegexFeaturizer
- name: LexicalSyntacticFeaturizer
- name: CountVectorsFeaturizer
- name: CountVectorsFeaturizer
  analyzer: char_wb
  min_ngram: 1
  max_ngram: 4
- name: DIETClassifier
  epochs: 100
- name: EntitySynonymMapper
- name: ResponseSelector
  epochs: 100
  # Fallback: Se o Rasa tiver menos de 70% de certeza do que o operador disse,
  # ele não tenta adivinhar. Útil para evitar acidentes no simulador.
- name: FallbackClassifier
  threshold: 0.8
  ambiguity_threshold: 0.1

# As Policies definem como o bot escolhe a próxima resposta na conversa
policies:
- name: MemoizationPolicy
- name: RulePolicy
- name: TEDPolicy
  max_history: 5
  epochs: 100
  constrain_similarities: true
